name: Sync with Hugging Face Hub

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face (Forensic Subtree Sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # The surgical senior method: split, then force-push
          git remote add hf https://sarveshraam:$HF_TOKEN@huggingface.co/spaces/sarveshraam/ARIA
          git fetch hf main || true
          
          # 1. Split the 'backend' folder into a temporary branch
          git subtree split --prefix backend -b hf_sync_branch
          
          # 2. Force-push that specific branch to Hugging Face's main branch
          git push -f hf hf_sync_branch:main
