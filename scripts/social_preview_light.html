<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA Social Preview Generator (Light)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --card: #f1f5f9;
            --brand: #0891b2; /* Slightly deeper cyan for white background legibility */
            --text: #0f172a;
            --muted: #64748b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* 1280x640 Canvas */
        .canvas {
            width: 1280px;
            height: 640px;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(8, 145, 178, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        /* Abstract UI Elements */
        .grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .content {
            display: flex;
            align-items: center;
            gap: 60px;
            z-index: 10;
        }

        .logo-box {
            width: 280px;
            height: 280px;
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .shield {
            width: 140px;
            height: 140px;
            color: var(--brand);
            filter: drop-shadow(0 0 10px rgba(8, 145, 178, 0.2));
        }

        .text-group {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 140px;
            font-weight: 800;
            line-height: 1;
            color: var(--text);
            letter-spacing: -0.04em;
            margin: 0;
            text-transform: uppercase;
        }

        .brand-name span {
            color: var(--brand);
        }

        .subtitle {
            font-size: 28px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-top: 10px;
            margin-left: 8px;
        }

        .tag {
            position: absolute;
            bottom: 60px;
            left: 60px;
            padding: 8px 16px;
            background: rgba(8, 145, 178, 0.05);
            border: 1px solid rgba(8, 145, 178, 0.1);
            border-radius: 100px;
            color: var(--brand);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="grid"></div>
        
        <div class="tag">System Mesh: Active</div>

        <div class="content">
            <div class="logo-box">
                <svg class="shield" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/>
                </svg>
            </div>

            <div class="text-group">
                <h1 class="brand-name">ARIA<span>HQ</span></h1>
                <div class="subtitle">Risk Intelligence</div>
            </div>
        </div>
    </div>

</body>
</html>
